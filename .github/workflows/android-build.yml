name: Android Build & Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Gradle Wrapper
      working-directory: ./ExcelTableApp
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Create Gradlew Script
      working-directory: ./ExcelTableApp
      run: |
        echo '#!/bin/sh' > gradlew
        echo 'DIRNAME=$(dirname "$0")' >> gradlew
        echo 'CLASSPATH=$DIRNAME/gradle/wrapper/gradle-wrapper.jar' >> gradlew
        echo 'exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
        chmod +x gradlew

    - name: Generate App Icons
      working-directory: ./ExcelTableApp
      run: |
        sudo apt-get update && sudo apt-get install -y imagemagick
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        convert -size 48x48 xc:'#1A237E' -fill white -font DejaVu-Sans-Bold -pointsize 16 -gravity center -annotate +0+0 "WT" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:'#1A237E' -fill white -font DejaVu-Sans-Bold -pointsize 24 -gravity center -annotate +0+0 "WT" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:'#1A237E' -fill white -font DejaVu-Sans-Bold -pointsize 32 -gravity center -annotate +0+0 "WT" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:'#1A237E' -fill white -font DejaVu-Sans-Bold -pointsize 48 -gravity center -annotate +0+0 "WT" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:'#1A237E' -fill white -font DejaVu-Sans-Bold -pointsize 64 -gravity center -annotate +0+0 "WT" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

    - name: Build Debug APK
      working-directory: ./ExcelTableApp
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Build Release APK
      working-directory: ./ExcelTableApp
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: ExcelTableApp/app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: app-release
        path: ExcelTableApp/app/build/outputs/apk/release/*.apk
        retention-days: 30
