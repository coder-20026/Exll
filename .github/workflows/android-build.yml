name: Android Build & Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    # Setup Java 17 (required for AGP 8.x)
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    # Setup Gradle Wrapper
    - name: Setup Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        
        # Download Gradle Wrapper JAR
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
        
        # Create gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        
        # Create gradlew script
        cat > gradlew << 'GRADLEW'
#!/bin/sh

##############################################################################
## Gradle start up script for UN*X
##############################################################################

# Attempt to set APP_HOME
PRG="$0"
while [ -h "$PRG" ] ; do
    ls=`ls -ld "$PRG"`
    link=`expr "$ls" : '.*-> \(.*\)$'`
    if expr "$link" : '/.*' > /dev/null; then
        PRG="$link"
    else
        PRG=`dirname "$PRG"`"/$link"
    fi
done
SAVED="`pwd`"
cd "`dirname \"$PRG\"`/" >/dev/null
APP_HOME="`pwd -P`"
cd "$SAVED" >/dev/null

APP_NAME="Gradle"
APP_BASE_NAME=`basename "$0"`

MAX_FD="maximum"

warn () {
    echo "$*"
}

die () {
    echo
    echo "$*"
    echo
    exit 1
}

cygwin=false
msys=false
darwin=false
nonstop=false
case "`uname`" in
  CYGWIN* )
    cygwin=true
    ;;
  Darwin* )
    darwin=true
    ;;
  MINGW* )
    msys=true
    ;;
  NONSTOP* )
    nonstop=true
    ;;
esac

CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar

if [ -n "$JAVA_HOME" ] ; then
    if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
        JAVACMD="$JAVA_HOME/jre/sh/java"
    else
        JAVACMD="$JAVA_HOME/bin/java"
    fi
    if [ ! -x "$JAVACMD" ] ; then
        die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME"
    fi
else
    JAVACMD="java"
    which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set"
fi

if [ "$cygwin" = "false" -a "$darwin" = "false" -a "$nonstop" = "false" ] ; then
    MAX_FD_LIMIT=`ulimit -H -n`
    if [ $? -eq 0 ] ; then
        if [ "$MAX_FD" = "maximum" -o "$MAX_FD" = "max" ] ; then
            MAX_FD="$MAX_FD_LIMIT"
        fi
        ulimit -n $MAX_FD
    fi
fi

DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'

save () {
    for i do printf %s\\n "$i" | sed "s/'/'\\\\''/g;1s/^/'/;\$s/\$/' \\\\/" ; done
    echo " "
}
APP_ARGS=`save "$@"`

eval set -- $DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS "\"-Dorg.gradle.appname=$APP_BASE_NAME\"" -classpath "\"$CLASSPATH\"" org.gradle.wrapper.GradleWrapperMain "$APP_ARGS"

exec "$JAVACMD" "$@"
GRADLEW
        
        chmod +x gradlew
        echo "Gradle Wrapper setup complete!"
        
    # Generate Drawable Assets
    - name: Generate Drawable Assets
      run: |
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        sudo apt-get update && sudo apt-get install -y imagemagick
        
        # Generate App Icons
        for size in 48 72 96 144 192; do
          density=""
          case $size in
            48) density="mdpi" ;;
            72) density="hdpi" ;;
            96) density="xhdpi" ;;
            144) density="xxhdpi" ;;
            192) density="xxxhdpi" ;;
          esac
          
          convert -size ${size}x${size} xc:'#1A237E' \
            -fill white -font DejaVu-Sans-Bold -pointsize $((size/3)) \
            -gravity center -annotate +0+0 "WT" \
            "app/src/main/res/mipmap-${density}/ic_launcher.png"
            
          cp "app/src/main/res/mipmap-${density}/ic_launcher.png" \
             "app/src/main/res/mipmap-${density}/ic_launcher_round.png"
        done
        
        echo "Drawable assets generated!"
        
    # Grant execute permission
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # Build Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    # Build Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true
      
    # Upload Debug APK
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    # Upload Release APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: success() || failure()
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
